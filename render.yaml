services:
  - type: web
    name: authbridge-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MCP_TRANSPORT
        value: sse
      - key: HOST
        value: 0.0.0.0
    healthCheckPath: /health
    plan: free
