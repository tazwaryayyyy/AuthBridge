services:
  - type: web
    name: authbridge-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: MCP_TRANSPORT
        value: sse
      - key: HOST
        value: 0.0.0.0
    plan: free
